services:
  postgres:
    image: postgres:16-alpine
    container_name: wesc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wesc
    ports:
      - "5433:5432"
    volumes:
      - wesc_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wesc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - wesc_redisdata:/data

volumes:
  wesc_pgdata:
  wesc_redisdata:
